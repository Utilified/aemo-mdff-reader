name: Release

# Publishes to PyPI when a version tag (vX.Y.Z) is pushed to the repo.
#
# Setup required (one-time, by repo admin):
#   1. Configure Trusted Publishing on PyPI:
#      https://docs.pypi.org/trusted-publishers/
#      Project name: aemo-mdff-reader
#      Owner: utilified
#      Repository: aemo-mdff-reader
#      Workflow: release.yml
#      Environment: pypi
#   2. Create a GitHub environment named "pypi" with required reviewers.
#
# Usage: git tag v2.0.0 && git push --tags

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate distributions
        run: twine check --strict dist/*
      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import aemo_mdff_reader as m; print(m.__version__)"
          /tmp/smoke/bin/aemo-mdff-reader --version
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    # Gated on a repository variable so the workflow runs cleanly on
    # tag push before PyPI Trusted Publishing is configured. To enable
    # publishing, set ``vars.PYPI_PUBLISH_ENABLED == 'true'`` under
    # *Settings → Secrets and variables → Actions → Variables* (and
    # configure the ``pypi`` Environment + Trusted Publishing per
    # CONTRIBUTING.md).
    if: ${{ vars.PYPI_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aemo-mdff-reader/
    permissions:
      id-token: write   # for trusted publishing + sigstore (no API token needed)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Sign distributions with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Stage signatures for the GitHub Release, then remove from dist
        # ``pypa/gh-action-pypi-publish`` is supposed to upload only
        # ``.whl`` / ``.tar.gz``, but we move signatures out of dist/
        # explicitly so a future regression cannot accidentally try to
        # upload ``.sigstore.json`` to PyPI (which would fail the run).
        run: |
          mkdir -p signatures
          if compgen -G "dist/*.sigstore*" > /dev/null; then
            mv dist/*.sigstore* signatures/
          fi
          ls -la dist/ signatures/
      - uses: actions/upload-artifact@v7
        with:
          name: signatures
          path: signatures/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Attach signatures to GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub Release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: signatures
          path: signatures/
      - name: Create GitHub Release with notes from CHANGELOG
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            signatures/*
