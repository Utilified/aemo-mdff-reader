name: Release

# Publishes to PyPI when a version tag (vX.Y.Z) is pushed to the repo.
#
# Setup required (one-time, by repo admin):
#   1. Configure Trusted Publishing on PyPI:
#      https://docs.pypi.org/trusted-publishers/
#      Project name: aemo-mdff-reader
#      Owner: Utilified
#      Repository: aemo-mdff-reader
#      Workflow: release.yml
#      Environment: pypi
#   2. Create a GitHub environment named "pypi" with required reviewers.
#
# Usage:
#   - Automated: release-please.yml dispatches this workflow after merging
#     a release-please PR (the GITHUB_TOKEN-pushed tag will not auto-trigger
#     this workflow, hence the explicit dispatch).
#   - Manual: git tag vX.Y.Z && git push --tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # for build provenance + SBOM attestations
      attestations: write # for build provenance + SBOM attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate distributions
        run: twine check --strict dist/*
      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import aemo_mdff_reader as m; print(m.__version__)"
          /tmp/smoke/bin/aemo-mdff-reader --version
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      # SBOM is written outside dist/ so the publish job's PyPI upload
      # (which only accepts .whl/.tar.gz) is not contaminated.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./dist
          format: cyclonedx-json
          output-file: sbom/aemo_mdff_reader.cdx.json
          dependency-snapshot: false
      - name: Attest SBOM against artifacts
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          sbom-path: sbom/aemo_mdff_reader.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom/

  publish:
    name: Publish to PyPI
    needs: build
    # Gated on a repository variable so the workflow runs cleanly on
    # tag push before PyPI Trusted Publishing is configured. To enable
    # publishing, set ``vars.PYPI_PUBLISH_ENABLED == 'true'`` under
    # *Settings → Secrets and variables → Actions → Variables* (and
    # configure the ``pypi`` Environment + Trusted Publishing per
    # CONTRIBUTING.md).
    if: ${{ vars.PYPI_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aemo-mdff-reader/
    permissions:
      id-token: write   # for trusted publishing + sigstore (no API token needed)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Sign distributions with sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Stage signatures for the GitHub Release, then remove from dist
        # ``pypa/gh-action-pypi-publish`` is supposed to upload only
        # ``.whl`` / ``.tar.gz``, but we move signatures out of dist/
        # explicitly so a future regression cannot accidentally try to
        # upload ``.sigstore.json`` to PyPI (which would fail the run).
        run: |
          mkdir -p signatures
          if compgen -G "dist/*.sigstore*" > /dev/null; then
            mv dist/*.sigstore* signatures/
          fi
          ls -la dist/ signatures/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: signatures
          path: signatures/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Attach signatures to GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub Release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: signatures
          path: signatures/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
          path: sbom/
      - name: Create GitHub Release with notes from CHANGELOG
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            signatures/*
            sbom/*
