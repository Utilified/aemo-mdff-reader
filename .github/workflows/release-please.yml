name: release-please

# Generates release PRs from Conventional Commits and, when those PRs are
# merged, creates the corresponding git tag. The tag push then triggers
# release.yml (build + sigstore + SLSA + SBOM + PyPI publish).
#
# Tags created via the default GITHUB_TOKEN do NOT trigger downstream
# tag-based workflows (GitHub anti-recursion guard). To work around this
# without introducing a long-lived PAT, we explicitly dispatch
# release.yml after a release is created. release.yml also still listens
# on tag push so manual tag pushes by maintainers continue to work.
#
# Forcing a release (e.g. for a chore-only changeset) without waiting
# for a feat/fix commit:
#   - Add `Release-As: x.y.z` as a commit footer, OR
#   - Run this workflow manually via "workflow_dispatch".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default token permissions are read-only. Each job opts into the
# narrower writes it actually needs (Scorecard TokenPermissionsID).
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # release-please pushes the release commit + tag
      pull-requests: write     # release-please opens the release PR
      actions: write           # to dispatch release.yml after a release is created
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger release.yml for the new tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs.tag_name }}"
          echo "Dispatching release.yml for tag: $tag"
          # --repo is required: this job has no actions/checkout step, so
          # gh has no git context to infer the repository from.
          gh workflow run release.yml --ref "$tag" --repo "${{ github.repository }}"
