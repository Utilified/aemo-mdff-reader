name: Feature request
description: Suggest a new capability or enhancement
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do that the library makes hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behaviour or API look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they're not ideal.
    validations:
      required: false

  - type: dropdown
    id: contribute
    attributes:
      label: Would you contribute a PR?
      options:
        - "Yes"
        - "Maybe"
        - "No"
    validations:
      required: true
