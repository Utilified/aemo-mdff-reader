version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group routine bumps together so we don't flood the PR queue.
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "mypy"
          - "build"
          - "twine"
          - "ruff"
          - "pre-commit"
