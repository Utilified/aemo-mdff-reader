version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Bundle routine action minor/patch bumps into one PR; majors stay separate for review.
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group routine bumps together so we don't flood the PR queue.
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "mypy"
          - "build"
          - "twine"
          - "ruff"
          - "pre-commit"
      # Bundle runtime extras (pandas/pyarrow/PyMySQL) minor/patch bumps; majors stay separate.
      runtime-extras-minor-patch:
        patterns:
          - "pandas"
          - "pyarrow"
          - "PyMySQL"
        update-types:
          - "minor"
          - "patch"
  # Hash-pinned CI requirements (dev/lint/build/audit) — Dependabot keeps
  # the wheel hashes fresh so we don't have to re-run pip-compile by hand.
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      ci-requirements:
        patterns:
          - "*"
