[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nem12-reader"
version = "2.0.0"
description = "Fast streaming reader for AEMO NEM12 / NEM13 metering files. Zero required dependencies."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.8"
authors = [
    { name = "Utilified Holdings Pty Ltd" },
]
keywords = ["nem12", "nem13", "aemo", "energy", "metering", "australia", "mdff"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Scientific/Engineering",
    "Topic :: Utilities",
]
# Core has no required runtime dependencies.
dependencies = []

[project.optional-dependencies]
pandas = ["pandas>=1.3"]
parquet = ["pandas>=1.3", "pyarrow>=10"]
mysql = ["PyMySQL>=1.0"]
dev = [
    "pytest>=7",
    "pytest-cov>=4",
    "pandas>=1.3",
]

[project.scripts]
nem12-reader = "nem12_reader.cli:main"

[project.urls]
Homepage = "https://github.com/utilified/nem12-reader"
Repository = "https://github.com/utilified/nem12-reader"
Issues = "https://github.com/utilified/nem12-reader/issues"
Changelog = "https://github.com/utilified/nem12-reader/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
include = ["nem12_reader*"]

[tool.setuptools.package-data]
nem12_reader = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
